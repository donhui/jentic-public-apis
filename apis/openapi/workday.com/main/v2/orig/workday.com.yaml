            the 10th object.
          in: query
          name: offset
          required: false
          schema:
            format: int64
            type: integer
        - description: >-
            Searches workers by name or worker ID. The search is
            case-insensitive. You can include space-delimited search strings for
            an OR search.
          in: query
          name: search
          required: false
          schema:
            type: string
      responses:
        '200':
          content:

openapi: 3.0.0
info:
  description: >-
    The Absence Management service enables applications to access worker
    information about leaves of absence and time off details.
  title: absenceManagement
  version: v2
  x-workday-internal-protected-usage-enabled: false
  x-workday-internal-routing: Public
  x-workday-internal-service-container-id: f7b74eb21dea10001af392117b2b03c8
  x-workday-internal-source: xo
servers:
  - url: 'https://<tenantHostname>/absenceManagement/v2'
paths:
  /balances:
    get:
      parameters:
        - description: 'The Workday ID of the Time Off, Leave Type, or Absence Table.'
          in: query
          name: category
          required: false
          schema:
            type: string
        - description: >-
            Absence balances as of the specified date using the yyyy-mm-dd
            format.
          in: query
          name: effective
          required: false
          schema:
            format: date
            type: string
        - description: >-
            The maximum number of objects in a single response. The default is
            20. The maximum is 100.
          in: query
          name: limit
          required: false
          schema:
            format: int64
            type: integer
        - description: >-
            The zero-based index of the first object in a response collection.
            The default is 0. Use offset with the limit parameter to control
            paging of a response collection. Example: If limit is 5 and offset
            is 9, the response returns a collection of 5 objects starting with
            the 10th object.
          in: query
          name: offset
          required: false
          schema:
            format: int64
            type: integer
        - description: The Workday ID of the worker for which balances are returned.
          in: query
          name: worker
          required: false
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    items:
                      $ref: >-
                        #/components/schemas/absenceBalanceView_842800d7bb021000741e5d56eac70162
                    type: array
                  total:
                    format: int64
                    type: integer
                type: object
          description: >-
            Successful response. A successful response can return no matched
            data.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VALIDATION_ERROR_MODEL_REFERENCE'
          description: 'Invalid request. (https://community.workday.com/rest/error-messages)'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VALIDATION_ERROR_MODEL_REFERENCE'
          description: >-
            Invalid resource or operation.
            (https://community.workday.com/rest/error-messages)
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VALIDATION_ERROR_MODEL_REFERENCE'
          description: >-
            User has insufficient permissions.
            (https://community.workday.com/rest/error-messages)
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VALIDATION_ERROR_MODEL_REFERENCE'
          description: >-
            Resource not found.
            (https://community.workday.com/rest/error-messages)
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ERROR_MODEL_REFERENCE'
          description: An error occurred.
      tags:
        - balances
      description: >-
        Retrieves the balance of all absence plan and leave of absence type for
        the specified worker ID.

        You can filter the balances by category, effective date, and worker.

        Specify category to filter the result based on absence type.


        There are 3 category types:


        * Leave of Absence Type, WID=17bd6531c90c100016d74f8dfae007d0 


        * Absence Table, WID=17bd6531c90c100016da3f5b554007d2


        * Time Off, WID=7bd6531c90c100016d4b06f2b8a07ce


        <b>Secured by:</b> Self-Service: Leave of Absence Entitlements,
        Self-Service: Time Off Balances, Worker Data: Leave of Absence, Worker
        Data: Time Off (Time Off Balances Manager View), Worker Data: Time Off
        (Time Off Balances)


        <b>Scope:</b> Time Off and Leave
      summary: >-
        Retrieves the balance of all absence plan and leave of absence type for
        the specified worker ID.
      x-workday-internal-try-enabled: 'true'
  '/balances/{ID}':
    get:
      parameters:
        - description: The Workday ID of the resource.
          in: path
          name: ID
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:

overlay: 1.1.0
info:
  title: "Reconcile googleapis.com docs v1 spec against live API responses"
  version: "1.0.0"
actions:
  - target: "$.paths['/v1/documents'].post.responses['200'].content"
    description: "Remove wildcard '*/*' content-type key for docs.documents.create — confirmed real response is application/json"
    remove: true
  - target: "$.paths['/v1/documents'].post.responses['200']"
    description: "Set response content-type to application/json for docs.documents.create"
    update:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Document"
  - target: "$.paths['/v1/documents/{documentId}'].get.responses['200'].content"
    description: "Remove wildcard '*/*' content-type key for docs.documents.get — confirmed real response is application/json"
    remove: true
  - target: "$.paths['/v1/documents/{documentId}'].get.responses['200']"
    description: "Set response content-type to application/json for docs.documents.get"
    update:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Document"
  - target: "$.paths['/v1/documents/{documentId}:batchUpdate'].post.responses['200'].content"
    description: "Remove wildcard '*/*' content-type key for docs.documents.batchUpdate — confirmed real response is application/json"
    remove: true
  - target: "$.paths['/v1/documents/{documentId}:batchUpdate'].post.responses['200']"
    description: "Set response content-type to application/json for docs.documents.batchUpdate"
    update:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BatchUpdateDocumentResponse"
